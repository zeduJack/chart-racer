<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial gradients -->
  <ellipse cx="300" cy="315" rx="400" ry="300" fill="#38bdf8" opacity="0.03"/>
  <ellipse cx="900" cy="200" rx="350" ry="250" fill="#a78bfa" opacity="0.03"/>

  <!-- Bar chart visualization (right side) -->
  <!-- Bar 1 (longest) -->
  <rect x="520" y="160" width="560" height="52" rx="0 8 8 0" fill="url(#bar1)" filter="url(#glow)"/>
  <rect x="520" y="160" width="560" height="24" rx="0 8 0 0" fill="rgba(255,255,255,0.06)"/>
  <!-- Bar 2 -->
  <rect x="520" y="232" width="430" height="52" rx="0 8 8 0" fill="url(#bar2)" filter="url(#glow)"/>
  <rect x="520" y="232" width="430" height="24" rx="0 8 0 0" fill="rgba(255,255,255,0.06)"/>
  <!-- Bar 3 -->
  <rect x="520" y="304" width="320" height="52" rx="0 8 8 0" fill="url(#bar3)" filter="url(#glow)"/>
  <rect x="520" y="304" width="320" height="24" rx="0 8 0 0" fill="rgba(255,255,255,0.06)"/>
  <!-- Bar 4 -->
  <rect x="520" y="376" width="200" height="52" rx="0 8 8 0" fill="url(#bar4)" filter="url(#glow)"/>
  <rect x="520" y="376" width="200" height="24" rx="0 8 0 0" fill="rgba(255,255,255,0.06)"/>

  <!-- Labels left of bars -->
  <text x="505" y="193" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="end">#1 Alpha</text>
  <text x="505" y="265" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="end">#2 Beta</text>
  <text x="505" y="337" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="end">#3 Gamma</text>
  <text x="505" y="409" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="end">#4 Delta</text>

  <!-- Left side: Brand + text -->
  <!-- Brand accent bar -->
  <rect x="80" y="200" width="8" height="60" rx="4" fill="url(#brand)"/>

  <!-- Title -->
  <text x="108" y="242" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">ChartRacer</text>

  <!-- Subtitle -->
  <text x="108" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">Bar Chart Race Video Generator</text>

  <!-- Feature tags -->
  <rect x="108" y="330" width="120" height="34" rx="6" fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="168" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#38bdf8" text-anchor="middle">KI-Recherche</text>

  <rect x="240" y="330" width="100" height="34" rx="6" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>
  <text x="290" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#a78bfa" text-anchor="middle">Remotion</text>

  <rect x="352" y="330" width="110" height="34" rx="6" fill="rgba(52,211,153,0.12)" stroke="#34d399" stroke-width="1" stroke-opacity="0.3"/>
  <text x="407" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#34d399" text-anchor="middle">MP4 Export</text>

  <!-- Bottom label -->
  <text x="80" y="560" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.2)">YouTube · Instagram Reels · TikTok · 1080p · 30fps</text>
</svg>
